<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>OSMnavigator</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="theme-color" content="#000000">

    <!-- iOS PWA support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="./assets/icons/osmnavigator-icon-192.png">

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">

    <!-- Styles -->
    <!-- <link rel="stylesheet" href="./src/style.css"> -->
</head>

<body>
    <div class="container-fluid p-0">
        <nav class="navbar bg-body-tertiary p-0">
            <div class="container-fluid">
                <span class="navbar-brand font-weight-bold">OSMnavigator</span>
                <button class="navbar-toggler border-0 px-0"
                        type="button"
                        data-bs-toggle="offcanvas"
                        data-bs-target="#offcanvasRight"
                        aria-controls="offcanvasRight"
                        aria-expanded="false"
                        aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </nav>

        <div id="progress" class="progress" role="progressbar" aria-label="Animated striped example" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-bar progress-bar-striped progress-bar-animated"></div>
        </div>

        <div id="map"></div>
    </div>

    <input type="file" id="gpx-upload-input" class="d-none" accept=".gpx" />

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">OSMnavigator</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="list-group list-group-flush">
                <li class="list-group-item">
                    <a data-bs-toggle="collapse" href="#collapseSettings" role="button" aria-expanded="false" aria-controls="collapseSettings">
                        Settings
                    </a>
                    <div class="collapse" id="collapseSettings">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" role="switch" id="mapCachingSwitch" checked>
                                    <label class="form-check-label" for="mapCachingSwitch">Enable tile caching</label>
                                </div>
                            </li>
                        </ul>
                    </div>
                </li>
            </ul>
            <div id="device-support-log" class="container-fluid p-0"></div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
