<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OSMnavigator</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="container-fluid p-0">
        <nav class="navbar navbar-expand-lg bg-body-tertiary p-0">
            <div class="container-fluid">
                <span class="navbar-brand">OSMnavigator</span>
            </div>
        </nav>
        <input type="file" id="gpx-upload" accept=".gpx" />
        <button id="navigate">Navigate</button>
        <button id="wake-lock">Keep Awake</button>
        <span id="gps-accuracy">GPS Accuracy: <span id="accuracy-value"></span></span>
        <div id="map" style="width: 100%; height: 90vh;"></div>
    </div>

    <script type="module" src="src/app.js"></script>
</body>
</html>
